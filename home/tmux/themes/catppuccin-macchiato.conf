# Catppuccin — Macchiato (recolors the existing status layout)
set -g status-style                 "fg=#cad3f5,bg=#1e2030"
setw -g window-status-style         "fg=#a5adcb,bg=#1e2030"
setw -g window-status-current-style "fg=#24273a,bg=#c6a0f6"
set -g pane-border-style            "fg=#494d64"
set -g pane-active-border-style     "fg=#c6a0f6"
set -g message-style                "fg=#cad3f5,bg=#494d64"
set -g mode-style                   "fg=#24273a,bg=#c6a0f6"
