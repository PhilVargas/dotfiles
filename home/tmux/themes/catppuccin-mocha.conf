# Catppuccin — Mocha (recolors the existing status layout)
set -g status-style                 "fg=#cdd6f4,bg=#181825"
setw -g window-status-style         "fg=#a6adc8,bg=#181825"
setw -g window-status-current-style "fg=#1e1e2e,bg=#cba6f7"
set -g pane-border-style            "fg=#45475a"
set -g pane-active-border-style     "fg=#cba6f7"
set -g message-style                "fg=#cdd6f4,bg=#45475a"
set -g mode-style                   "fg=#1e1e2e,bg=#cba6f7"
